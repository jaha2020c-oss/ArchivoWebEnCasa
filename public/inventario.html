<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Comedor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #ffffff;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            padding: 20px;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .logo {
            width: 120px;
            display: block;
            margin-bottom: 15px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .menu-item {
            font-size: 18px;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            color: #333;
        }

        .menu-item:hover {
            color: #4CAF50;
        }

        .menu-item.volver {
            color: red;
        }

        /* Content */
        .content {
            margin-left: 270px; 
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        tbody tr:hover {
            background: #f1f1f1;
        }

        .scroll-table {
            max-height: 400px;
            overflow-y: auto;
        }

        .formulario {
            display: flex;
            flex-direction: column;
            width: 350px;
        }

        .formulario input, .formulario select {
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .formulario button {
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .formulario button:hover {
            background: #45a049;
        }

        .message {
            font-weight: bold;
            margin-top: 10px;
        }

        .message.success { color: green; }
        .message.error { color: red; }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <img src="logo.png" alt="Logo" class="logo">
        <div class="panel-title">Inventario</div>

        <div class="menu-item" onclick="showSection('ver')">Ver Inventario</div>
        <div class="menu-item" onclick="showSection('agregar')">Agregar Producto</div>
        <div class="menu-item" onclick="showSection('editar')">Editar Producto</div>
        <div class="menu-item volver" onclick="goBack()">Volver</div>
    </div>

    <div class="content" id="content">
        <!-- Panel derecho vacío al inicio -->
        <div id="sectionContent"></div>
    </div>

    <script>
        function goBack() {
            window.location.href = "/menu.html"; // vuelve al menú principal
        }

        function showSection(option) {
            const container = document.getElementById('sectionContent');
            
            if(option === 'ver') {
                container.innerHTML = `
                 <h2>Inventario de Ingredientes</h2>
                 <div class="scroll-table">
                  <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ingrediente</th>
                        <th>Unidad</th>
                        <th>Cantidad</th>
                        <th>Precio Compra</th>
                        <th>Disponibilidad</th>
                    </tr>
                  </thead>
                 <tbody id="tablaInventario">
                    <tr><td colspan="6">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    `;

    fetch('/inventario')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('tablaInventario');
            tbody.innerHTML = '';
            data.forEach(item => {
                const disponibleText = item.disponibilidad ? "Disponible" : "No disponible";
                tbody.innerHTML += `
                    <tr>
                        <td>${item.id_ingrediente}</td>
                        <td>${item.nombre_ingrediente}</td>
                        <td>${item.unidad_medida}</td>
                        <td>${item.cantidad || 0}</td>
                        <td>${item.precio_compra}</td>
                        <td>${disponibleText}</td>
                    </tr>
                `;
            });
        })
        .catch(err => {
            document.getElementById('tablaInventario').innerHTML = '<tr><td colspan="6">Error al cargar inventario</td></tr>';
            console.error(err);
        });
        }

        if(option === 'agregar') {
    container.innerHTML = `
        <h2>Agregar producto al inventario</h2>

        <form id="formAgregar" class="formulario">
            <label>Nombre del producto:</label>
            <input type="text" id="nombre" required>

            <label>Unidad de medida:</label>
            <input type="text" id="unidad" placeholder="Ej: kg, litros, unidades" required>

            <label>Cantidad:</label>
            <input type="number" id="cantidad" min="0" required>

            <label>Precio de compra:</label>
            <input type="number" step="0.01" id="precio" min="0" required>

            <label>Disponibilidad:</label>
            <select id="disponibilidad" required>
                <option value="">Seleccione...</option>
                <option value="Disponible">Disponible</option>
                <option value="No disponible">No disponible</option>
            </select>

            <button type="submit">Guardar producto</button>
        </form>

        <p id="mensaje" class="message"></p>
    `;

    document.getElementById("formAgregar").addEventListener("submit", function(e){
        e.preventDefault();

        const data = {
            nombre: document.getElementById("nombre").value,
            unidad: document.getElementById("unidad").value,
            cantidad: document.getElementById("cantidad").value,
            precio: document.getElementById("precio").value,
            disponibilidad: document.getElementById("disponibilidad").value
        };

        fetch('/agregarProducto', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        .then(res => res.text())
        .then(res => {
            const msg = document.getElementById("mensaje");
            if(res === "OK"){
                msg.className = "message success";
                msg.innerText = "Producto agregado correctamente ✔";
                document.getElementById("formAgregar").reset();
            } else {
                msg.className = "message error";
                msg.innerText = "Error al agregar el producto";
            }
        })
        .catch(err => {
            const msg = document.getElementById("mensaje");
            msg.className = "message error";
            msg.innerText = "Error de conexión";
            console.error(err);
        });
    });
}

        if(option === 'editar') {
            container.innerHTML = `
                <h2>Editar / Eliminar Producto</h2>

                <div class="formulario" style="width: 450px;">
                    <label>ID del ingrediente:</label>
                    <div class="row">
                        <input type="number" id="edit_id" placeholder="Ingrese ID" style="flex:1;">
                        <button id="btnBuscar" style="width:120px;">Buscar</button>
                    </div>

                    <div id="editForm" style="display:none; margin-top:15px;">
                        <label>Nombre del producto:</label>
                        <input type="text" id="edit_nombre">

                        <label>Unidad de medida:</label>
                        <input type="text" id="edit_unidad">

                        <label>Cantidad:</label>
                        <input type="number" id="edit_cantidad" min="0">

                        <label>Precio de compra:</label>
                        <input type="number" step="0.01" id="edit_precio" min="0">

                        <label>Disponibilidad:</label>
                        <select id="edit_disponibilidad">
                            <option value="Disponible">Disponible</option>
                            <option value="No disponible">No disponible</option>
                        </select>

                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button id="btnGuardar" type="button">Guardar cambios</button>
                            <button id="btnEliminar" type="button" style="background:#f44336;">Eliminar producto</button>
                        </div>

                        <p id="editMensaje" class="message"></p>
                    </div>
                </div>
            `;

            // activar búsqueda
            document.getElementById('btnBuscar').addEventListener('click', async function(e){
                e.preventDefault();
                const id = document.getElementById('edit_id').value.trim();
                const msg = document.getElementById('editMensaje');
                msg.innerText = '';
                if(!id){ msg.className='message error'; msg.innerText='Ingresa un ID válido'; return; }

                try{
                    const resp = await fetch(`/producto/${encodeURIComponent(id)}`);
                    if(resp.status === 404){
                        msg.className='message error';
                        msg.innerText='Ingrediente no encontrado';
                        document.getElementById('editForm').style.display='none';
                        return;
                    }
                    const data = await resp.json();
                    // mostrar formulario
                    document.getElementById('editForm').style.display='block';
                    document.getElementById('edit_nombre').value = data.nombre_ingrediente || '';
                    document.getElementById('edit_unidad').value = data.unidad_medida || '';
                    document.getElementById('edit_cantidad').value = data.cantidad || 0;
                    document.getElementById('edit_precio').value = data.precio_compra || 0;
                    document.getElementById('edit_disponibilidad').value = data.disponibilidad ? 'Disponible' : 'No disponible';
                    msg.innerText = '';
                }catch(err){
                    msg.className='message error';
                    msg.innerText='Error al buscar ingrediente';
                    console.error(err);
                }
            });

            // guardar cambios
            document.addEventListener('click', function(e){
                if(e.target && e.target.id === 'btnGuardar'){
                    (async function(){
                        const id = document.getElementById('edit_id').value.trim();
                        const nombre = document.getElementById('edit_nombre').value.trim();
                        const unidad = document.getElementById('edit_unidad').value.trim();
                        const cantidad = document.getElementById('edit_cantidad').value;
                        const precio = document.getElementById('edit_precio').value;
                        const disponibilidad = document.getElementById('edit_disponibilidad').value;
                        const msg = document.getElementById('editMensaje');
                        msg.innerText = '';

                        if(!id || !nombre || !unidad || cantidad === '' || precio === ''){
                            msg.className='message error';
                            msg.innerText='Todos los campos son obligatorios';
                            return;
                        }

                        try{
                            const resp = await fetch('/editarProducto', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    id, nombre, unidad, precio, cantidad, disponibilidad
                                })
                            });

                            const text = await resp.text();
                            if(text === 'OK'){
                                msg.className='message success';
                                msg.innerText='Producto actualizado correctamente';
                            } else {
                                msg.className='message error';
                                msg.innerText='Error al actualizar';
                            }
                        }catch(err){
                            msg.className='message error';
                            msg.innerText='Error de conexión';
                            console.error(err);
                        }
                    })();
                }
            });

            // eliminar producto
            document.addEventListener('click', function(e){
                if(e.target && e.target.id === 'btnEliminar'){
                    (async function(){
                        const id = document.getElementById('edit_id').value.trim();
                        const msg = document.getElementById('editMensaje');
                        msg.innerText = '';

                        if(!id){
                            msg.className='message error';
                            msg.innerText='Ingresa un ID válido';
                            return;
                        }

                        if(!confirm('¿Estás seguro de eliminar este producto? Esta acción no se puede deshacer.')) return;

                        try{
                            const resp = await fetch('/eliminarProducto', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ id })
                            });

                            const text = await resp.text();
                            if(text === 'OK'){
                                msg.className='message success';
                                msg.innerText='Producto eliminado correctamente';
                                // limpiar form
                                document.getElementById('editForm').style.display='none';
                                document.getElementById('edit_id').value='';
                            } else {
                                msg.className='message error';
                                msg.innerText='Error al eliminar';
                            }
                        }catch(err){
                            msg.className='message error';
                            msg.innerText='Error de conexión';
                            console.error(err);
                        }
                    })();
                }
            });
        }

        // al cargar la página por primera vez mostrar ver
        // (opcional) showSection('ver');
    }
    </script>
</body>
</html>
