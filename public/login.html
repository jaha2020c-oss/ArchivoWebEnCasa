<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewpot" content="width=device-width, initial-scale=1.0">
    <title>Login - Comedor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container{
            background: white;
            width: 350px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.2);
        }

        .logo{
            display: block;
            margin: 0 auto 15px auto;
            width: 100px;
            height: auto;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        label{
            font-size: 14px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #bbb;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #45a049;
        }

        .mensaje{
            text-align: center;
            margin-bottom: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <img src="logo.png" alt="Logo Comedor" class="logo">
        <h2>Iniciar Sesion</h2>

        <p class="mensaje" id="msgError"></p>

        <label>Usuario:</label>
        <input type="text" id="usuario">

        <label>contraseña:</label>
        <input type="password" id="contraseña">

        <button onclick="login()">Entrar</button>
    </div>

    <script>
        async function login() {
        const user = document.getElementById("usuario").value;
        const pass = document.getElementById("contraseña").value;
        const msg = document.getElementById("msgError");

        if (user === "" || pass === "") {
            msg.innerText = "Todos los campos son obligatorios";
            msg.style.color = "red";
            msg.style.display = "block";
            return;
        }

        try{
            const response = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `usuario=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`
            });

            const result = await response.text();

            if (result === "OK") {
                msg.innerText = "Login correcto. Bienvenido ";
                msg.style.color = "green";
                msg.style.display = "block";
                setTimeout(() => {
                    window.location.href = "/menu.html";
                }, 1000);
            } else{
                msg.innerText = "Usuario o contraseña incorrectos";
                msg.style.color = "red";
                msg.style.display = "block";
            }
        }catch(e){
            msg.innerText = "No se pudo conectar al servidor";
            msg.style.color = "red";
            msg.style.display = "block";
            console.error(e);
        }
    }
    </script>

</body>
</html>
